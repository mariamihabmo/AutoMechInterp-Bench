[project]
name = "automechinterp-evaluator"
version = "0.1.0"
description = "Deterministic stage-gate harness for agentic mechanistic interpretability claims"
requires-python = ">=3.10"
dependencies = [
  "PyYAML>=6.0",
]

[project.scripts]
automechinterp-evaluator = "automechinterp_evaluator.cli:main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
addopts = "-q"
